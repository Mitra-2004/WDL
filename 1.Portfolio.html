<!DOCTYPE html>
<html>
<head>
<title>Student Portfolio</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

.container{
width:500px;
margin:60px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#003366;
}

label{
font-weight:bold;
}

input[type="text"]{
width:100%;
padding:8px;
margin:6px 0 15px;
border:1px solid #ccc;
border-radius:4px;
}

.options{
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
background:#003366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0055aa;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table,th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#003366;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Portfolio</h2>

<form onsubmit="addData(event)">

<label>Name</label>
<input type="text" id="name" required>

<label>Course</label>

<div class="options">
<input type="radio" name="course" value="IT"> IT<br>
<input type="radio" name="course" value="Computer"> Computer Engineering<br>
<input type="radio" name="course" value="AI"> Artificial Intelligence
</div>

<label>Gender</label>

<div class="options">
<input type="radio" name="gender" value="Male"> Male<br>
<input type="radio" name="gender" value="Female"> Female<br>
<input type="radio" name="gender" value="Others"> Others
</div>

<label>Hobbies</label>

<div class="options">
<input type="checkbox" value="Reading" class="hobby"> Reading<br>
<input type="checkbox" value="Traveling" class="hobby"> Traveling<br>
<input type="checkbox" value="Sports" class="hobby"> Sports<br>
<input type="checkbox" value="Music" class="hobby"> Music
</div>

<button type="submit">Submit</button>

</form>

<h3>Submitted Details</h3>

<table id="table">

<tr>
<th>Name</th>
<th>Course</th>
<th>Gender</th>
<th>Hobbies</th>
</tr>

</table>

</div>

<script>

function addData(e){

e.preventDefault();

var name=document.getElementById("name").value;

var c=document.querySelector('input[name="course"]:checked');
var course=c?c.value:"";

var g=document.querySelector('input[name="gender"]:checked');
var gender=g?g.value:"";

var hobbies="";
document.querySelectorAll(".hobby:checked").forEach(function(h){
hobbies+=h.value+" ";
});

var row=document.getElementById("table").insertRow();

row.insertCell(0).innerHTML=name;
row.insertCell(1).innerHTML=course;
row.insertCell(2).innerHTML=gender;
row.insertCell(3).innerHTML=hobbies;

document.querySelector("form").reset();

}

</script>

</body>
</html>
