<!DOCTYPE html>
<html>
<head>
<title>User Survey Form</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

.container{
width:520px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#003366;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input[type="text"],input[type="number"]{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:4px;
}

.options{
margin-top:5px;
}

button{
width:100%;
padding:10px;
background:#003366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:15px;
margin-top:10px;
}

button:hover{
background:#0055aa;
}

table{
width:100%;
margin-top:25px;
border-collapse:collapse;
}

table,th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#003366;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>User Survey Form</h2>

<form onsubmit="addData(event)">

<div class="form-group">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age" required>
</div>

<div class="form-group">
<label>Gender</label>

<div class="options">
<input type="radio" name="gender" value="Male"> Male<br>
<input type="radio" name="gender" value="Female"> Female<br>
<input type="radio" name="gender" value="Other"> Other
</div>

</div>

<div class="form-group">
<label>Interests</label>

<div class="options">
<input type="checkbox" value="Technology" class="interest"> Technology<br>
<input type="checkbox" value="Sports" class="interest"> Sports<br>
<input type="checkbox" value="Music" class="interest"> Music<br>
<input type="checkbox" value="Travel" class="interest"> Travel
</div>

</div>

<button type="submit">Submit</button>

</form>

<h3>Survey Responses</h3>

<table id="table">

<tr>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Interests</th>
</tr>

</table>

</div>

<script>

function addData(e){

e.preventDefault();

var name=document.getElementById("name").value;
var age=document.getElementById("age").value;

var g=document.querySelector('input[name="gender"]:checked');
var gender=g?g.value:"";

var interests="";
document.querySelectorAll(".interest:checked").forEach(function(i){
interests+=i.value+" ";
});

var row=document.getElementById("table").insertRow();

row.insertCell(0).innerHTML=name;
row.insertCell(1).innerHTML=age;
row.insertCell(2).innerHTML=gender;
row.insertCell(3).innerHTML=interests;

document.querySelector("form").reset();

}

</script>

</body>
</html>
