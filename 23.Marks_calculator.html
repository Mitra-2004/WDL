<!DOCTYPE html>
<html>
<head>
<title>Student Marks Calculator</title>

<style>

/* page background */

body{
font-family:Arial;
background:linear-gradient(to right,#7F7FD5,#86A8E7,#91EAE4);
}

/* main container */

.container{
width:420px;
margin:60px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
}

/* heading */

h2{
text-align:center;
color:#003366;
}

/* inputs */

input{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ccc;
border-radius:4px;
}

/* button */

button{
width:100%;
padding:10px;
background:#003366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* hover effect */

button:hover{
background:#0055aa;
}

/* result */

.result{
margin-top:15px;
background:#f4f6f9;
padding:10px;
text-align:center;
font-weight:bold;
}

</style>

<script>

function calculateResult(){

var name=document.getElementById("name").value;

var m1=parseFloat(document.getElementById("m1").value);
var m2=parseFloat(document.getElementById("m2").value);
var m3=parseFloat(document.getElementById("m3").value);
var m4=parseFloat(document.getElementById("m4").value);
var m5=parseFloat(document.getElementById("m5").value);

var total=m1+m2+m3+m4+m5;

var percentage=total/5;

var grade;

if(percentage>=75)
grade="A";
else if(percentage>=60)
grade="B";
else if(percentage>=50)
grade="C";
else
grade="Fail";

document.getElementById("result").innerHTML=
"Student Name: "+name+
"<br>Total Marks: "+total+
"<br>Percentage: "+percentage.toFixed(2)+"%"+
"<br>Grade: "+grade;

}

</script>

</head>

<body>

<div class="container">

<h2>Student Marks Calculator</h2>

<input type="text" id="name" placeholder="Enter Student Name">

<input type="number" id="m1" placeholder="Subject 1 Marks">

<input type="number" id="m2" placeholder="Subject 2 Marks">

<input type="number" id="m3" placeholder="Subject 3 Marks">

<input type="number" id="m4" placeholder="Subject 4 Marks">

<input type="number" id="m5" placeholder="Subject 5 Marks">

<button onclick="calculateResult()">Calculate Result</button>

<div id="result" class="result"></div>

</div>

</body>
</html>
